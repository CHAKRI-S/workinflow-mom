services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workinflow-mom-app
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.workinflow-mom.rule=Host(`mom.workinflow.cloud`)"
      - "traefik.http.routers.workinflow-mom.entrypoints=https"
      - "traefik.http.routers.workinflow-mom.tls=true"
      - "traefik.http.routers.workinflow-mom.tls.certresolver=letsencrypt"
      - "traefik.http.services.workinflow-mom.loadbalancer.server.port=3000"
      - "traefik.http.routers.workinflow-mom-http.rule=Host(`mom.workinflow.cloud`)"
      - "traefik.http.routers.workinflow-mom-http.entrypoints=http"
      - "traefik.http.routers.workinflow-mom-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - workinflow
      - coolify

  db:
    image: postgres:16-alpine
    container_name: workinflow-mom-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workinflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Wf2026MomProd!Secure}
      POSTGRES_DB: ${POSTGRES_DB:-workinflow_mom}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workinflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - workinflow

volumes:
  pgdata:

networks:
  workinflow:
    driver: bridge
  coolify:
    external: true

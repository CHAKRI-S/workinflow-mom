name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 145.79.12.13
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR="/opt/workinflow-mom"

            # Clone or pull
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/CHAKRI-S/workinflow-mom.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$APP_DIR"

            # Write .env
            cat > .env << 'ENVEOF'
            DATABASE_URL=postgresql://workinflow:Wf2026MomProd!Secure@db:5432/workinflow_mom?schema=public
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            NEXTAUTH_URL=https://mom.workinflow.cloud
            POSTGRES_USER=workinflow
            POSTGRES_PASSWORD=Wf2026MomProd!Secure
            POSTGRES_DB=workinflow_mom
            ENVEOF

            # Remove leading whitespace from heredoc
            sed -i 's/^            //' .env

            # Build and deploy
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            # Wait for DB
            sleep 10

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy

            # Seed if first deploy
            docker compose -f docker-compose.prod.yml exec -T app npx prisma db seed 2>/dev/null || true

            echo "Deploy complete!"

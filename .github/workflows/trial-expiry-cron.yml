name: Trial Expiry Cron

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC = 07:00, 13:00, 19:00, 01:00 Bangkok)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call trial expiry endpoint
        run: |
          curl -sS --max-time 60 --retry 2 --retry-delay 5 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://mom.workinflow.cloud/api/cron/trial-expiry" \
            || echo "Cron call failed — will retry next cycle"

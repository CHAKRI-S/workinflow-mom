services:
  postgres:
    image: postgres:16-alpine
    container_name: workinflow-mom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: workinflow_mom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
